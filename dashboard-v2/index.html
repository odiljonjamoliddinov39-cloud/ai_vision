<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Vision Dashboard V2</title>
    <link rel="icon" type="image/svg+xml" href="/dashboard-v2/assets/favicon.svg" />
    <link rel="stylesheet" href="/dashboard-v2/assets/styles.css?v=15" />
  </head>
  <body>
    <main class="v2-shell">
      <aside class="v2-sidebar">
        <div class="brand-card">
          <button id="sidebarToggle" class="menu-btn" type="button" aria-label="Toggle sidebar" aria-expanded="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="4" y1="6" x2="20" y2="6" />
              <line x1="4" y1="12" x2="20" y2="12" />
              <line x1="4" y1="18" x2="20" y2="18" />
            </svg>
          </button>
          <div class="brand-text">
            <span>AI Vision</span>
            <strong>Enterprise Control</strong>
            <small>Dashboard V2</small>
          </div>
          <img id="brandAvatar" class="brand-avatar" alt="Profile picture" hidden />
        </div>

        <nav class="module-nav" id="moduleNav" aria-label="Dashboard modules"></nav>

        <div class="side-section" id="companiesSection">
          <p class="side-title">Companies</p>
          <ul class="side-companies" id="sideCompanies"></ul>
        </div>
      </aside>

      <section class="v2-main">
        <header class="v2-header">
          <div>
            <p class="eyebrow">Enterprise warehouse intelligence</p>
            <h1 id="pageTitle">Head Dashboard</h1>
            <p id="scopeLine" class="muted">Loading permissions…</p>
          </div>
          <div class="header-actions">
            <button id="refreshBtn" type="button">Refresh</button>
          </div>
        </header>

        <section class="status-grid" id="summaryGrid" aria-label="Dashboard summary"></section>

        <section class="workspace-grid">
          <article class="panel large">
            <div class="panel-head">
              <div>
                <p class="eyebrow" id="activeModuleEyebrow">Module</p>
                <h2 id="activeModuleTitle">Overview</h2>
              </div>
              <span class="state-pill" id="detectorState">Checking…</span>
            </div>
            <div id="moduleContent" class="module-content"></div>
          </article>

        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/dashboard-v2/assets/app.js?v=15" type="module"></script>
  </body>
</html>
