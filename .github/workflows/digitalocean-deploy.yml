name: Deploy backend to DigitalOcean

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: digitalocean-backend-production
  cancel-in-progress: true

env:
  DIGITALOCEAN_APP_ID: 589d905d-7121-4474-8575-c7c557395062

jobs:
  deploy:
    name: Deploy latest main to App Platform
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Trigger DigitalOcean App Platform deployment
        run: |
          set -euo pipefail

          deployment_id="$(
            doctl apps create-deployment "$DIGITALOCEAN_APP_ID" --format ID --no-header \
              | grep -Eo '[0-9a-f-]{36}' \
              | head -1
          )"

          if [ -z "$deployment_id" ]; then
            echo "DigitalOcean did not return a deployment id."
            exit 1
          fi

          echo "DigitalOcean deployment: $deployment_id"
          for i in $(seq 1 70); do
            echo "DigitalOcean deployment status check $i/70"
            doctl apps get-deployment "$DIGITALOCEAN_APP_ID" "$deployment_id" --format ID,Progress,Phase,UpdatedAt --no-header
            phase="$(doctl apps get-deployment "$DIGITALOCEAN_APP_ID" "$deployment_id" --format Phase --no-header | tr -d '[:space:]')"

            if [ "$phase" = "ACTIVE" ]; then
              echo "DigitalOcean deployment is ACTIVE."
              exit 0
            fi

            if [ "$phase" = "ERROR" ] || [ "$phase" = "CANCELED" ] || [ "$phase" = "SUPERSEDED" ]; then
              echo "DigitalOcean deployment ended with phase: $phase"
              exit 1
            fi

            sleep 30
          done

          echo "Timed out waiting for DigitalOcean deployment to become ACTIVE."
          exit 1
