# ===========================================
# AI Vision Assistant - Configuration
# ===========================================

# Camera sources.
# For a USB webcam, use the integer index as a string or int (0, 1, 2 ...).
# For an RTSP CCTV camera, use the full stream URL, e.g.:
#   "rtsp://username:password@192.168.1.64:554/Streaming/Channels/101"
cameras:
  - name: "Camera 1"
    source: 0
  # - name: "Camera 2"
  #   source: "rtsp://user:pass@192.168.1.64:554/Streaming/Channels/101"

# Detection settings
detection:
  model_path: "models/yolov8n.pt"   # small/fast model, auto-downloaded on first run
  confidence_threshold: 0.5
  device: "cpu"                     # "cpu" or "cuda" (if you have a GPU + torch CUDA build)
  classes: null                     # null = detect all classes, or list of class names to filter

# Display settings
display:
  show_fps: true
  window_prefix: "AI Vision -"
  box_thickness: 2
  font_scale: 0.6

# Snapshot settings (Phase 1, FR-5)
snapshots:
  enabled: true
  save_dir: "snapshots"
  trigger_classes: ["person", "car"]  # save an image whenever these classes are detected
  cooldown_seconds: 5                 # avoid spamming snapshots for the same class

# Event log settings (Phase 1, FR-6)
logging:
  enabled: true
  log_dir: "logs"
  log_file: "events.log"
