cameras:
- name: Camera 1
  source: 0

detection:
  model_path: models/yolov8n.pt
  confidence_threshold: 0.5
  device: cpu
  classes: null
display:
  show_fps: true
  window_prefix: AI Vision -
  box_thickness: 2
  font_scale: 0.6
  live_feed_enabled: true
snapshots:
  enabled: true
  save_dir: snapshots
  trigger_classes:
  - person
  - car
  cooldown_seconds: 5
logging:
  enabled: true
  log_dir: logs
  log_file: events.log
