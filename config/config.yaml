cameras:
- name: Camera 1
  source: 0

detection:
  model_path: models/yolov8n.pt
  confidence_threshold: 0.5
  device: cpu
  classes: null
display:
  show_fps: true
  window_prefix: AI Vision -
  box_thickness: 2
  font_scale: 0.6
  live_feed_enabled: true
tracking:
  enabled: true
  tracker_config: bytetrack.yaml   # or botsort.yaml for appearance re-id
  classes: null                    # null = track all detected classes
  grace_period_seconds: 5.0        # how long a missing track is still "checked in"
  db_path: database/tracking.db
warehouse_counting:
  enabled: true
  db_path: database/warehouse.db
  confidence_threshold: 0.5
  count_low_confidence_as_unknown: true
  counting_line:
    x1: 100
    y1: 300
    x2: 900
    y2: 300
snapshots:
  enabled: true
  save_dir: snapshots
  trigger_classes:
  - person
  - car
  cooldown_seconds: 5
logging:
  enabled: true
  log_dir: logs
  log_file: events.log
