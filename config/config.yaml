cameras:
- name: Camera 1
  source: 0

detection:
  model_path: models/yolov8s-worldv2.pt
  confidence_threshold: 0.08
  image_size: 960
  class_agnostic_nms: true
  device: cpu
  classes: null
  class_prompts:
  - stack of cardboard boxes
  - cardboard box
  - stack of sacks
  - sack of flour
  - large bag
  - wrapped pallet
  - wooden pallet
  - warehouse package
display:
  show_fps: true
  window_prefix: AI Vision -
  box_thickness: 2
  font_scale: 0.6
  live_feed_enabled: true
tracking:
  enabled: true
  tracker_config: config/warehouse_bytetrack.yaml
  classes: null
  grace_period_seconds: 5.0
  db_path: database/tracking.db
warehouse_counting:
  enabled: true
  mode: appearance
  db_path: database/warehouse.db
  confidence_threshold: 0.08
  count_low_confidence_as_unknown: true
  counting_line:
    x1: 100
    y1: 300
    x2: 900
    y2: 300
snapshots:
  enabled: true
  save_dir: snapshots
  trigger_classes:
  - person
  - car
  cooldown_seconds: 5
logging:
  enabled: true
  log_dir: logs
  log_file: events.log
