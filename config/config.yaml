cameras:
- name: Demo Camera
  source: dummy
  slot_number: 1
detection:
  model_path: dummy
  confidence_threshold: 0.08
  image_size: 960
  class_agnostic_nms: true
  device: cpu
  classes: null
  class_prompts:
  - stack of cardboard boxes
  - cardboard box
  - stack of sacks
  - sack of flour
  - large bag
  - wrapped pallet
  - wooden pallet
  - warehouse package
spatial_analysis:
  enabled: true
  horizontal_fov_degrees: 90.0
  camera_height_m: 1.2
  horizon_y_ratio: 0.28
  min_distance_m: 0.5
  max_distance_m: 50.0
  estimate_depth_layers: false
  max_units_per_detection: 200
  unit_dimensions:
    cardboard box:
      width_m: 0.45
      height_m: 0.35
      depth_m: 0.35
    sack:
      width_m: 0.55
      height_m: 0.18
      depth_m: 0.25
display:
  show_fps: true
  window_prefix: AI Vision -
  box_thickness: 2
  font_scale: 0.6
  live_feed_enabled: true
  live_frame_width: 320
  live_frame_jpeg_quality: 28
tracking:
  enabled: true
  tracker_config: config/warehouse_bytetrack.yaml
  classes: null
  grace_period_seconds: 5.0
  db_path: database/tracking.db
warehouse_counting:
  enabled: true
  mode: appearance
  db_path: database/warehouse.db
  confidence_threshold: 0.08
  count_low_confidence_as_unknown: true
  counting_line:
    x1: 100
    y1: 300
    x2: 900
    y2: 300
recognition:
  enabled: true
  provider: gemini
  model: gemini-3.1-flash-lite
  db_path: database/products.db
  confidence_threshold: 0.9
  similarity_threshold: 0.92
  cache_enabled: true
  cache_expiration: 1800
  timeout: 30
  retries: 2
  max_workers: 2
  catalog_only: true
  catalog_db_path: database/catalog.db
snapshots:
  enabled: true
  save_dir: snapshots
  trigger_classes:
  - person
  - car
  cooldown_seconds: 5
logging:
  enabled: true
  log_dir: logs
  log_file: events.log
